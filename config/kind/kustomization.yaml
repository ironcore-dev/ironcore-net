apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../default

patches:
- path: patch-apiserver.yaml
- path: patch-manager.yaml
- path: add-apiserver-args.yaml
  target:
    group: apps
    kind: Deployment
    name: ironcore-net-apiserver
    namespace: ironcore-net-system
    version: v1
